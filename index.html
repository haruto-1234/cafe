<!DOCTYPE html>
<!--
  ============================================================
  Cafe MORE 日報アプリ  /  単一ファイルで完結・そのまま公開できます
  ============================================================
  ■ 本番（要件4=DB保存 / 要件5=ネット公開）にするための3ステップ:

  1) Supabase でプロジェクトを作成し、SQL Editor で下記を実行:

     create table if not exists reports (
       id          uuid primary key default gen_random_uuid(),
       report_date date        not null,
       store       text        not null,
       author      text        not null,
       body        text        not null,
       created_at  timestamptz not null default now()
     );
     alter table reports enable row level security;
     create policy "read for all"   on reports for select using (true);
     create policy "insert for all" on reports for insert with check (true);

  2) Supabase の Project Settings → API から
     「Project URL」と「anon public」キーを下の CONFIG に貼る。

  3) この index.html を Vercel / Netlify / GitHub Pages などに置く。
     発行された公開URLをスマホで開けば完成（要件5）。

  ※ キーが空のままだと「デモ表示」モード（ブラウザ内に一時保存）で動きます。
     見た目の確認用です。要件4・5を満たすには 1)〜3) が必要です。
  ============================================================
-->
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cafe MORE 日報</title>
<style>
  :root{
    --ink:#2A211B; --ink2:#7A6B5C; --ink3:#9C8B79;
    --bg:#E9DFCC; --paper:#F7F2E9; --card:#FFFFFF;
    --line:#EAE0CD; --crema:#D99A3E; --crema-d:#BE832B;
    --ok:#3F9D6B; --warn:#C2410C;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    background:var(--bg); color:var(--ink); min-height:100vh; padding:0 0 40px;
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",
      "Yu Gothic UI","Yu Gothic",-apple-system,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.6;
  }
  .wrap{ max-width:520px; margin:0 auto; }

  /* ---------- ヘッダー ---------- */
  header{ background:var(--ink); color:#F4ECDD; padding:18px 18px 16px; }
  @media(min-width:540px){ header{ border-radius:0 0 18px 18px; } }
  .brand{ display:flex; align-items:center; gap:8px; }
  .brand h1{ margin:0; font-size:22px; line-height:1; display:flex; align-items:baseline; gap:6px; font-weight:400; }
  .cafe{ font-weight:300; letter-spacing:.06em; color:#E9DFCC; font-size:19px; }
  .more{ font-weight:800; letter-spacing:.14em; color:#E7B25E; }
  .more i{ display:inline-block; width:5px; height:5px; border-radius:50%; background:#E7B25E; margin-left:3px; vertical-align:2px; }
  .sub{ margin-left:4px; font-size:12px; font-weight:600; letter-spacing:.18em; color:#B7A98F;
        border:1px solid #574A3C; padding:3px 7px; border-radius:6px; align-self:center; }
  .head-row{ display:flex; align-items:center; justify-content:space-between; margin-top:11px; }
  .tagline{ font-size:12.5px; color:#C6B89E; }
  .mode{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; display:inline-flex; align-items:center; gap:5px; }
  .mode .dot{ width:7px; height:7px; border-radius:50%; }
  .mode.demo{ background:#4A3D2E; color:#E7C98A; }
  .mode.live{ background:#1F3A2C; color:#7FD3A1; }

  /* ---------- 入力フォーム（上） ---------- */
  main{ padding:14px 14px 0; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px; }
  .form{ padding:16px 16px 18px; box-shadow:0 6px 20px rgba(42,33,27,.06); }
  .form-title{ display:flex; align-items:center; gap:7px; font-size:14px; font-weight:800; margin:0 0 14px; }
  .form-title .bar{ width:4px; height:16px; border-radius:2px; background:var(--crema); }

  .field{ margin-bottom:14px; }
  .field label{ display:flex; align-items:center; gap:7px; font-size:13px; font-weight:700; margin-bottom:7px; }
  .req{ font-style:normal; font-size:10px; font-weight:700; color:#C2703D; background:#F6E7DA; padding:2px 6px; border-radius:5px; }
  input[type=date], input[type=text], input[type=password], textarea{
    width:100%; border:1.5px solid var(--line); background:#fff; border-radius:11px;
    padding:12px 13px; font-size:15px; color:var(--ink); outline:0; font-family:inherit; transition:border .15s ease;
  }
  textarea{ resize:vertical; min-height:84px; line-height:1.65; }
  input:focus, textarea:focus{ border-color:var(--crema); }
  input::placeholder, textarea::placeholder{ color:var(--ink3); }
  .row{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  @media(max-width:380px){ .row{ grid-template-columns:1fr; } }

  .seg{ display:flex; gap:7px; }
  .seg button{ flex:1; border:1.5px solid var(--line); background:#fff; color:var(--ink2); font-size:13.5px;
    font-weight:700; border-radius:10px; padding:11px 4px; cursor:pointer; transition:all .12s ease; font-family:inherit; }
  .seg button:active{ transform:scale(.97); }
  .seg button.on{ color:#fff; }

  .error{ display:none; margin:2px 0 12px; font-size:12.5px; font-weight:600; color:var(--warn);
    background:#FCEBE0; border:1px solid #F3D3BF; border-radius:9px; padding:9px 11px; }
  .error.show{ display:block; }

  .submit{ width:100%; display:flex; align-items:center; justify-content:center; gap:7px;
    background:var(--crema); color:#3A2C16; font-size:15.5px; font-weight:800; border:0; border-radius:12px;
    padding:14px; cursor:pointer; letter-spacing:.02em; box-shadow:0 4px 12px rgba(217,154,62,.35);
    transition:transform .08s ease, background .15s ease; font-family:inherit; }
  .submit:hover{ background:var(--crema-d); }
  .submit:active{ transform:translateY(1px) scale(.995); }
  .submit:disabled{ opacity:.6; cursor:default; box-shadow:none; }

  /* ---------- 一覧（下） ---------- */
  .list-head{ display:flex; align-items:baseline; gap:8px; padding:20px 4px 10px; }
  .list-head h2{ margin:0; font-size:15px; font-weight:800; }
  .list-head span{ font-size:12.5px; color:var(--ink2); font-weight:600; }

  /* ---------- しぼり込み（検索・店舗） ---------- */
  .filters{ padding:2px 4px 8px; }
  #search{ margin-bottom:9px; }
  .store-filter{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{ border:1.5px solid var(--line); background:#fff; color:var(--ink2); font-size:12.5px; font-weight:700;
    border-radius:999px; padding:7px 13px; cursor:pointer; font-family:inherit; transition:all .12s ease; }
  .chip:active{ transform:scale(.97); }
  .chip.on{ color:#fff; border-color:transparent; }

  .item{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 14px 12px;
    margin-bottom:9px; box-shadow:inset 4px 0 0 #ccc; }
  .item-top{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
  .pill{ display:inline-flex; align-items:center; gap:4px; font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:7px; color:#fff; }
  .author{ font-size:14.5px; font-weight:700; }
  .when{ font-size:11.5px; color:var(--ink3); margin-left:auto; }
  .body{ margin:0; font-size:14px; line-height:1.7; color:#3A2E22; white-space:pre-wrap; word-break:break-word; }

  .empty{ text-align:center; color:var(--ink2); padding:40px 24px; }
  .empty .em-ic{ width:66px; height:66px; border-radius:50%; background:#fff; border:1px solid var(--line);
    display:grid; place-items:center; margin:0 auto 14px; font-size:28px; }
  .empty h3{ margin:0 0 6px; font-size:15px; color:var(--ink); }
  .empty p{ margin:0; font-size:13px; }

  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(10px);
    background:var(--ink); color:#F4ECDD; font-size:13.5px; font-weight:600; padding:11px 18px; border-radius:999px;
    display:flex; align-items:center; gap:7px; box-shadow:0 8px 24px rgba(42,33,27,.3);
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:50; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast .check{ color:#7FD08A; font-weight:800; }

  /* ---------- ログイン画面 ---------- */
  .auth-screen{ position:fixed; inset:0; z-index:80; background:var(--bg);
    display:flex; align-items:center; justify-content:center; padding:20px; overflow:auto; }
  .auth-card{ width:100%; max-width:380px; padding:20px 18px 22px; box-shadow:0 10px 30px rgba(42,33,27,.12); }
  .auth-tabs{ display:flex; gap:8px; margin-bottom:16px; }
  .auth-tab{ flex:1; padding:11px; border:1.5px solid var(--line); background:#fff; color:var(--ink2);
    font-size:14px; font-weight:800; border-radius:11px; cursor:pointer; font-family:inherit; transition:all .12s ease; }
  .auth-tab.on{ background:var(--ink); color:#F4ECDD; border-color:var(--ink); }
  .pw-wrap{ position:relative; }
  .pw-wrap input{ padding-right:58px; }
  .pw-toggle{ position:absolute; right:8px; top:50%; transform:translateY(-50%);
    border:0; background:transparent; color:var(--ink2); font-size:12.5px; font-weight:700;
    cursor:pointer; padding:6px 8px; font-family:inherit; border-radius:8px; }
  .pw-toggle:hover{ color:var(--ink); background:var(--paper); }

  /* ---------- ログイン中の表示（ヘッダー） ---------- */
  .who{ font-size:13px; color:#E9DFCC; font-weight:700; }
  .who-role{ font-size:10.5px; color:#E7C98A; background:#4A3D2E; padding:2px 8px; border-radius:999px; margin-left:6px; font-weight:700; }
  .logout{ font-size:11.5px; font-weight:700; color:#E9DFCC; background:transparent; border:1px solid #574A3C;
    border-radius:8px; padding:6px 11px; cursor:pointer; font-family:inherit; transition:background .12s ease; }
  .logout:hover{ background:#3a3025; }

  /* ---------- スタッフ管理（役割の割り当て） ---------- */
  .staff-row{ display:flex; align-items:center; gap:10px; padding:11px 0; border-top:1px solid var(--line); }
  .staff-row:first-child{ border-top:0; }
  .staff-main{ flex:1; min-width:0; }
  .staff-name{ font-size:14px; font-weight:700; }
  .staff-meta{ font-size:11.5px; color:var(--ink2); margin-top:2px; }
  .staff-row select{ border:1.5px solid var(--line); border-radius:9px; padding:8px 9px;
    font-size:13px; font-family:inherit; background:#fff; color:var(--ink); cursor:pointer; }
  .staff-row .me-tag{ font-size:11px; font-weight:700; color:var(--ink2); padding:6px 4px; }

  button:focus-visible, input:focus-visible, textarea:focus-visible{ outline:2.5px solid var(--crema); outline-offset:1px; }
  @media(prefers-reduced-motion:reduce){ *{ animation-duration:.001ms!important; transition-duration:.001ms!important; } }
</style>
</head>
<body>
<!-- ===== ログイン画面（未ログイン時に全画面表示） ===== -->
<div class="auth-screen" id="authScreen" style="display:none;">
  <div class="card auth-card">
    <p class="form-title"><span class="bar"></span>Cafe MORE にログイン</p>
    <div class="auth-tabs">
      <button type="button" id="tabLogin" class="auth-tab on">ログイン</button>
      <button type="button" id="tabSignup" class="auth-tab">新規登録</button>
    </div>

    <div class="field">
      <label for="authStaffNo">スタッフ番号</label>
      <input type="text" id="authStaffNo" inputmode="numeric" placeholder="例：1001" autocomplete="username" />
    </div>

    <div class="field signup-only" style="display:none;">
      <label for="authName">名前</label>
      <input type="text" id="authName" maxlength="40" placeholder="例：田中" />
    </div>
    <div class="field signup-only" style="display:none;">
      <label>店舗</label>
      <div class="seg" id="authStoreSeg" role="group" aria-label="店舗を選択"></div>
    </div>

    <div class="field">
      <label for="authPassword">パスワード</label>
      <div class="pw-wrap">
        <input type="password" id="authPassword" autocomplete="current-password" placeholder="6文字以上" />
        <button type="button" id="pwToggle" class="pw-toggle" aria-label="パスワードを表示">表示</button>
      </div>
    </div>

    <div class="error" id="authError" role="alert" aria-live="assertive"></div>
    <button class="submit" id="authSubmit" type="button">ログイン</button>
  </div>
</div>

<div class="wrap">
  <header>
    <div class="brand">
      <span aria-hidden="true" style="font-size:20px;line-height:1;">☕</span>
      <h1><span class="cafe">Cafe</span><span class="more">MORE<i></i></span></h1>
      <span class="sub">日報</span>
    </div>
    <div class="head-row" id="userBar" style="display:none;">
      <span class="who"><span id="whoName"></span><span class="who-role" id="whoRole"></span></span>
      <button type="button" id="logoutBtn" class="logout">ログアウト</button>
    </div>
    <div class="head-row" style="justify-content:flex-end;">
      <span id="mode" class="mode demo"><span class="dot" style="background:#E7C98A"></span>デモ表示</span>
    </div>
  </header>

  <main>
    <!-- 上：入力フォーム -->
    <section class="card form" aria-labelledby="formTitle">
      <p class="form-title" id="formTitle"><span class="bar"></span>日報を投稿する</p>

      <div class="row">
        <div class="field">
          <label for="date">日付</label>
          <input type="date" id="date" />
        </div>
        <div class="field">
          <label>店舗</label>
          <div class="seg" id="storeSeg" role="group" aria-label="店舗を選択"></div>
        </div>
      </div>

      <div class="field">
        <label for="author">名前 <em class="req">必須</em></label>
        <input type="text" id="author" maxlength="40" placeholder="例：田中" autocomplete="name" />
      </div>

      <div class="field">
        <label for="body">本文 <em class="req">必須</em></label>
        <textarea id="body" maxlength="2000" rows="4"
          placeholder="混雑状況、品切れ、クレーム、よかったことなど。箇条書きでもOK。"></textarea>
      </div>

      <div class="error" id="error" role="alert" aria-live="assertive"></div>

      <button class="submit" id="submit" type="button">日報を投稿する</button>
    </section>

    <!-- スタッフ管理（管理者・店長だけに表示） -->
    <section class="card form" id="staffPanel" style="display:none;">
      <p class="form-title"><span class="bar"></span>スタッフ管理（役割の割り当て）</p>
      <div id="staffList"></div>
    </section>

    <!-- 下：一覧（新しい順） -->
    <div class="list-head">
      <h2>みんなの日報</h2>
      <span id="count"></span>
    </div>

    <!-- 検索（名前・本文）と店舗のしぼり込み -->
    <div class="filters">
      <input type="text" id="search" placeholder="名前や本文で検索" autocomplete="off" />
      <div class="store-filter" id="storeFilter" role="group" aria-label="店舗でしぼり込み"></div>
    </div>

    <section id="list" aria-live="polite"></section>
  </main>
</div>

<div class="toast" id="toast"><span class="check">✓</span><span id="toastMsg"></span></div>

<script>
/* ===================== CONFIG ===================== */
/* デプロイ時にここを埋めると本物のDB(Supabase)に保存されます */
const SUPABASE_URL = "https://vulardtkhmqdmvavkalm.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_j6cnvki335TBi_2xSkNHUA_Ue6Qct2P";

const STORES = [
  { name: "渋谷店", color: "#C2703D" },
  { name: "新宿店", color: "#4F8A78" },
  { name: "横浜店", color: "#3E6FB0" },
];
const storeColor = (n) => (STORES.find(s => s.name === n) || {}).color || "#999";

/* ===================== 日付ユーティリティ ===================== */
const WEEK = ["日","月","火","水","木","金","土"];
const pad = (n) => String(n).padStart(2, "0");
function todayStr(){ const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtDate(ds){
  const [y,m,d] = ds.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  let label = `${m}月${d}日(${WEEK[dt.getDay()]})`;
  if (ds === todayStr()) label = "今日 ・ " + label;
  return label;
}
function fmtTime(iso){ const d = new Date(iso); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===================== データ層（Supabase / フォールバック） ===================== */
let DB = null;
let MODE = "demo";
let supa = null;                 // Supabaseクライアント（ログイン処理で使う）
let CURRENT_USER = null;         // ログイン中のユーザー（auth）
let CURRENT_PROFILE = null;      // ログイン中のスタッフ情報（profiles）
let booted = false;              // アプリ本体を起動済みか

function loadScript(src){
  return new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = () => rej(new Error("script load failed: " + src));
    document.head.appendChild(s);
  });
}

function makeSupabaseDB(client){
  const map = (r) => ({ id:r.id, date:r.report_date, store:r.store, author:r.author, body:r.body, createdAt:r.created_at });
  return {
    async list(){
      const { data, error } = await client.from("reports").select("*").order("created_at", { ascending:false });
      if (error) throw error;
      return (data || []).map(map);
    },
    async add(r){
      const { data, error } = await client.from("reports")
        .insert({ report_date:r.date, store:r.store, author:r.author, body:r.body,
                  user_id: (CURRENT_USER ? CURRENT_USER.id : null) })
        .select().single();
      if (error) throw error;
      return map(data);
    },
  };
}

/* プレビュー(claude.ai)では window.storage、その他の環境では localStorage に一時保存 */
function makeLocalDB(){
  const KEY = "cafe_more_reports";
  const artifactStore = (typeof window !== "undefined" && window.storage) ? window.storage : null;
  async function readAll(){
    if (artifactStore){ try{ const r = await artifactStore.get(KEY, false); return r ? JSON.parse(r.value) : []; } catch{ return []; } }
    try{ return JSON.parse(localStorage.getItem(KEY) || "[]"); } catch{ return []; }
  }
  async function writeAll(arr){
    if (artifactStore){ try{ await artifactStore.set(KEY, JSON.stringify(arr), false); } catch(e){ console.error(e); } return; }
    try{ localStorage.setItem(KEY, JSON.stringify(arr)); } catch(e){ console.error(e); }
  }
  return {
    async list(){ const a = await readAll(); return a.sort((x,y) => (x.createdAt < y.createdAt ? 1 : -1)); },
    async add(r){
      const row = { ...r, id:"local-" + Date.now() + "-" + Math.random().toString(36).slice(2,6), createdAt:new Date().toISOString() };
      const a = await readAll(); a.push(row); await writeAll(a); return row;
    },
  };
}

async function initDB(){
  if (SUPABASE_URL && SUPABASE_ANON_KEY){
    try{
      await loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js");
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      supa = client;
      DB = makeSupabaseDB(client);
      MODE = "live";
      return;
    }catch(e){ console.error("Supabase 初期化に失敗。デモモードで継続します。", e); }
  }
  DB = makeLocalDB();
  MODE = "demo";
}

/* ===================== UI ===================== */
const $ = (id) => document.getElementById(id);
let reports = [];
let selectedStore = STORES[0].name;
let selectedFilterStore = "all";  // 一覧のしぼり込み（"all"=全店）
let searchText = "";              // 検索キーワード

function renderStoreSeg(){
  const seg = $("storeSeg");
  seg.innerHTML = "";
  STORES.forEach(s => {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = s.name;
    const apply = () => {
      selectedStore = s.name;
      [...seg.children].forEach(c => { c.classList.remove("on"); c.style.background = ""; c.style.borderColor = ""; });
      b.classList.add("on"); b.style.background = s.color; b.style.borderColor = s.color;
    };
    b.addEventListener("click", apply);
    seg.appendChild(b);
    if (s.name === selectedStore) apply();
  });
}

function renderStoreFilter(){
  const box = $("storeFilter");
  box.innerHTML = "";
  const opts = [
    { name:"全店", value:"all", color:"#2A211B" },
    ...STORES.map(s => ({ name:s.name, value:s.name, color:s.color })),
  ];
  opts.forEach(o => {
    const b = document.createElement("button");
    b.type = "button"; b.className = "chip"; b.textContent = o.name;
    const apply = () => {
      selectedFilterStore = o.value;
      [...box.children].forEach(c => { c.classList.remove("on"); c.style.background = ""; });
      b.classList.add("on"); b.style.background = o.color;
      renderList();
    };
    b.addEventListener("click", apply);
    box.appendChild(b);
    if (o.value === selectedFilterStore){ b.classList.add("on"); b.style.background = o.color; }
  });
}

function renderMode(){
  const el = $("mode");
  if (MODE === "live"){ el.className = "mode live"; el.innerHTML = '<span class="dot" style="background:#7FD3A1"></span>DB接続'; }
  else { el.className = "mode demo"; el.innerHTML = '<span class="dot" style="background:#E7C98A"></span>デモ表示'; }
}

function renderList(){
  const list = $("list");

  // しぼり込み：店舗 → 検索キーワード（名前・本文）の順にふるい分け
  let shown = reports;
  if (selectedFilterStore !== "all") shown = shown.filter(r => r.store === selectedFilterStore);
  const q = searchText.trim().toLowerCase();
  if (q) shown = shown.filter(r => (r.author + " " + r.body).toLowerCase().includes(q));

  $("count").textContent = shown.length ? `${shown.length}件` : "";

  if (!shown.length){
    const msg = reports.length
      ? '<h3>該当する日報がありません</h3><p>検索や店舗のしぼり込みを変えてみてください。</p>'
      : '<h3>まだ日報がありません</h3><p>上のフォームから最初の1件を投稿してみましょう。</p>';
    list.innerHTML = '<div class="empty"><div class="em-ic">📋</div>' + msg + '</div>';
    return;
  }
  list.innerHTML = shown.map(r => {
    const c = storeColor(r.store);
    return (
      '<article class="item" style="box-shadow:inset 4px 0 0 ' + c + '">' +
        '<div class="item-top">' +
          '<span class="pill" style="background:' + c + '">' + esc(r.store) + '</span>' +
          '<span class="author">' + esc(r.author) + '</span>' +
          '<span class="when">' + esc(fmtDate(r.date)) + ' ' + fmtTime(r.createdAt) + '</span>' +
        '</div>' +
        '<p class="body">' + esc(r.body) + '</p>' +
      '</article>'
    );
  }).join("");
}

function showError(msg){ const e = $("error"); e.textContent = msg; e.classList.add("show"); }
function clearError(){ $("error").classList.remove("show"); }

let toastTimer = null;
function toast(msg){
  $("toastMsg").textContent = msg;
  const t = $("toast"); t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
}

async function onSubmit(){
  const date = $("date").value || todayStr();
  const author = $("author").value.trim();
  const body = $("body").value.trim();

  // 要件3: 名前か本文が空なら投稿させない
  if (!author && !body){ showError("名前と本文を入力してください。"); return; }
  if (!author){ showError("名前を入力してください。"); return; }
  if (!body){ showError("本文を入力してください。"); return; }
  clearError();

  const btn = $("submit");
  btn.disabled = true; btn.textContent = "投稿中…";
  try{
    const row = await DB.add({ date, store:selectedStore, author, body });
    reports.unshift(row);   // 要件2: 新しい順で先頭に追加 → すぐ一覧が増える
    renderList();
    $("body").value = "";   // 本文だけクリア（名前・店舗・日付は次の投稿用に残す）
    $("body").focus();
    toast("日報を投稿しました");
  }catch(e){
    console.error(e);
    showError("保存できませんでした。通信状況や Supabase の設定を確認してください。");
  }finally{
    btn.disabled = false; btn.textContent = "日報を投稿する";
  }
}

/* ===================== ログイン（認証） ===================== */
const EMAIL_DOMAIN = "@cafe-more.local";          // 番号 → 内部用メールアドレスに変換
const toEmail = (no) => String(no).trim() + EMAIL_DOMAIN;
const ROLE_LABELS = { admin:"管理者", manager:"店長", fulltime:"正社員", leader:"リーダー", part:"パート・アルバイト" };
const roleLabel = (r) => ROLE_LABELS[r] || r || "";

let authMode = "login";                            // "login" または "signup"
let authStore = STORES[0].name;

function showAuth(show){ $("authScreen").style.display = show ? "flex" : "none"; }
function showAuthError(msg){ const e = $("authError"); e.textContent = msg; e.classList.add("show"); }
function clearAuthError(){ $("authError").classList.remove("show"); }

function setAuthMode(m){
  authMode = m;
  $("tabLogin").classList.toggle("on", m === "login");
  $("tabSignup").classList.toggle("on", m === "signup");
  document.querySelectorAll(".signup-only").forEach(el => el.style.display = (m === "signup") ? "" : "none");
  $("authSubmit").textContent = (m === "signup") ? "登録してはじめる" : "ログイン";
  clearAuthError();
}

function renderAuthStoreSeg(){
  const seg = $("authStoreSeg"); seg.innerHTML = "";
  STORES.forEach(s => {
    const b = document.createElement("button"); b.type = "button"; b.textContent = s.name;
    const apply = () => {
      authStore = s.name;
      [...seg.children].forEach(c => { c.classList.remove("on"); c.style.background = ""; c.style.borderColor = ""; });
      b.classList.add("on"); b.style.background = s.color; b.style.borderColor = s.color;
    };
    b.addEventListener("click", apply); seg.appendChild(b);
    if (s.name === authStore) apply();
  });
}

function authErrorJa(e){
  const m = (e && e.message) ? e.message : String(e);
  if (/Invalid login credentials/i.test(m)) return "スタッフ番号またはパスワードが違います。";
  if (/already registered|already exists/i.test(m)) return "このスタッフ番号はすでに登録されています。";
  if (/at least 6/i.test(m)) return "パスワードは6文字以上にしてください。";
  if (/Email not confirmed/i.test(m)) return "メール確認設定がONです。Supabaseで『Confirm email』をOFFにしてください。";
  if (/disabled/i.test(m)) return "Supabase側でメール登録/ログインが無効になっています。";
  return "うまくいきませんでした：" + m;
}

async function refreshSession(){
  if (!supa) return null;
  const { data } = await supa.auth.getSession();
  CURRENT_USER = data.session ? data.session.user : null;
  return CURRENT_USER;
}

async function loadProfile(){
  CURRENT_PROFILE = null;
  if (!supa || !CURRENT_USER) return;
  const { data } = await supa.from("profiles").select("*").eq("id", CURRENT_USER.id).single();
  CURRENT_PROFILE = data || null;
}

function renderUserBar(){
  const bar = $("userBar");
  if (MODE !== "live" || !CURRENT_PROFILE){ bar.style.display = "none"; return; }
  bar.style.display = "flex";
  $("whoName").textContent = CURRENT_PROFILE.full_name || "名無し";
  $("whoRole").textContent = roleLabel(CURRENT_PROFILE.role);
}

async function onAuthSubmit(){
  const no = $("authStaffNo").value.trim();
  const pw = $("authPassword").value;
  if (!no){ showAuthError("スタッフ番号を入力してください。"); return; }
  if (!pw || pw.length < 6){ showAuthError("パスワードは6文字以上で入力してください。"); return; }
  clearAuthError();

  const btn = $("authSubmit"); const orig = btn.textContent;
  btn.disabled = true; btn.textContent = "処理中…";
  try{
    if (authMode === "signup"){
      const name = $("authName").value.trim() || "名無し";
      const { error } = await supa.auth.signUp({
        email: toEmail(no), password: pw,
        options: { data: { staff_no: no, full_name: name, store: authStore } },
      });
      if (error) throw error;
    } else {
      const { error } = await supa.auth.signInWithPassword({ email: toEmail(no), password: pw });
      if (error) throw error;
    }
    await refreshSession();
    if (!CURRENT_USER){
      showAuthError("ログインできませんでした。Supabaseの『Confirm email』をOFFにしてください。");
      return;
    }
    await loadProfile();
    showAuth(false);
    renderUserBar();
    await bootApp();
  }catch(e){
    console.error(e);
    showAuthError(authErrorJa(e));
  }finally{
    btn.disabled = false; btn.textContent = orig;
  }
}

function setupAuthUI(){
  $("tabLogin").addEventListener("click", () => setAuthMode("login"));
  $("tabSignup").addEventListener("click", () => setAuthMode("signup"));
  $("authSubmit").addEventListener("click", onAuthSubmit);
  $("authPassword").addEventListener("keydown", (e) => { if (e.key === "Enter"){ e.preventDefault(); onAuthSubmit(); } });
  $("pwToggle").addEventListener("click", () => {
    const inp = $("authPassword");
    const show = inp.type === "password";
    inp.type = show ? "text" : "password";
    $("pwToggle").textContent = show ? "隠す" : "表示";
  });
  renderAuthStoreSeg();
  setAuthMode("login");
  $("logoutBtn").addEventListener("click", async () => { try{ await supa.auth.signOut(); }catch(e){} location.reload(); });
}

/* ===================== スタッフ管理（役割の割り当て） ===================== */
const ALL_ROLES = ["admin","manager","fulltime","leader","part"];
let staffList = [];

function canManageRoles(){
  return MODE === "live" && CURRENT_PROFILE && (CURRENT_PROFILE.role === "admin" || CURRENT_PROFILE.role === "manager");
}

// 自分の役割で「割り当てられる役割」を決める（店長は管理者/店長を付与できない）
function assignableRoles(){
  if (CURRENT_PROFILE && CURRENT_PROFILE.role === "admin") return ALL_ROLES;
  return ["fulltime","leader","part"];
}

async function loadStaff(){
  staffList = [];
  if (!supa) return;
  const { data, error } = await supa.from("profiles").select("*").order("created_at", { ascending:true });
  if (error){ console.error(error); return; }
  staffList = data || [];
}

function renderStaffPanel(){
  const panel = $("staffPanel");
  if (!canManageRoles()){ panel.style.display = "none"; return; }
  panel.style.display = "";

  const box = $("staffList");
  if (!staffList.length){ box.innerHTML = '<p class="staff-meta">スタッフがまだいません。</p>'; return; }

  const allowed = assignableRoles();
  box.innerHTML = "";
  staffList.forEach(p => {
    const row = document.createElement("div"); row.className = "staff-row";

    const main = document.createElement("div"); main.className = "staff-main";
    const name = document.createElement("div"); name.className = "staff-name";
    name.textContent = p.full_name || "名無し";
    const meta = document.createElement("div"); meta.className = "staff-meta";
    meta.textContent = "番号 " + (p.staff_no || "未設定") + "　" + (p.store || "店舗未設定");
    main.appendChild(name); main.appendChild(meta);
    row.appendChild(main);

    const isSelf = CURRENT_USER && p.id === CURRENT_USER.id;
    // 自分の役割は変えられない（誤って管理者を外す事故ふせぎ）
    const canEdit = !isSelf && allowed.includes(p.role) || (!isSelf && allowed.length === ALL_ROLES.length);

    if (isSelf){
      const tag = document.createElement("span"); tag.className = "me-tag";
      tag.textContent = roleLabel(p.role) + "（あなた）";
      row.appendChild(tag);
    } else if (!canEdit){
      const tag = document.createElement("span"); tag.className = "me-tag";
      tag.textContent = roleLabel(p.role);
      row.appendChild(tag);
    } else {
      const sel = document.createElement("select");
      allowed.forEach(r => {
        const o = document.createElement("option");
        o.value = r; o.textContent = roleLabel(r);
        if (r === p.role) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener("change", () => onRoleChange(p, sel.value, sel));
      row.appendChild(sel);
    }

    box.appendChild(row);
  });
}

async function onRoleChange(p, newRole, sel){
  const prev = p.role;
  if (newRole === prev) return;
  sel.disabled = true;
  try{
    const { error } = await supa.from("profiles").update({ role: newRole }).eq("id", p.id);
    if (error) throw error;
    p.role = newRole;
    toast((p.full_name || "スタッフ") + " を「" + roleLabel(newRole) + "」にしました");
  }catch(e){
    console.error(e);
    sel.value = prev;   // 失敗したら元に戻す
    toast("変更できませんでした");
  }finally{
    sel.disabled = false;
  }
}

/* ===================== アプリ本体の起動 ===================== */
async function bootApp(){
  if (booted) return; booted = true;

  // ログイン中なら、店舗を自分の所属で初期化
  if (MODE === "live" && CURRENT_PROFILE && CURRENT_PROFILE.store
      && STORES.some(s => s.name === CURRENT_PROFILE.store)){
    selectedStore = CURRENT_PROFILE.store;
  }

  $("date").value = todayStr();
  renderStoreSeg();
  renderStoreFilter();

  // 名前はログイン情報で自動入力＆固定
  if (MODE === "live" && CURRENT_PROFILE){
    $("author").value = CURRENT_PROFILE.full_name || "";
    $("author").readOnly = true;
  }

  $("search").addEventListener("input", (e) => { searchText = e.target.value; renderList(); });
  $("submit").addEventListener("click", onSubmit);
  // 本文でEnterは改行のまま。名前欄でEnter→投稿
  $("author").addEventListener("keydown", (e) => { if (e.key === "Enter"){ e.preventDefault(); onSubmit(); } });

  try{ reports = await DB.list(); }catch(e){ console.error(e); reports = []; }
  renderList();

  // 管理者・店長ならスタッフ管理パネルを表示
  if (canManageRoles()){
    await loadStaff();
    renderStaffPanel();
  }
}

/* ===================== 起動 ===================== */
(async function init(){
  await initDB();
  renderMode();

  if (MODE === "live"){
    setupAuthUI();
    await refreshSession();
    if (CURRENT_USER){
      await loadProfile();
      showAuth(false);
      renderUserBar();
      await bootApp();
    } else {
      showAuth(true);   // 未ログインならログイン画面を出す
    }
  } else {
    // デモ表示モード（Supabase未接続）はログイン無しで動く
    await bootApp();
  }
})();
</script>
